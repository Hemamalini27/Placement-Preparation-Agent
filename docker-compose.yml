version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: placement_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  web:
    build: .
    container_name: placement_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/placement_db
    depends_on:
      - mongodb
    restart: always

volumes:
  mongo_data:
